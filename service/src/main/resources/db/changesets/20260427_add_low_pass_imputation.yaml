# insert all low_pass_imputation pipeline data. insertions into the following tables:
# - pipelines
# - pipeline_quotas
# - pipeline_input_definitions
# - pipeline_output_definitions
databaseChangeLog:
  - changeSet:
      id: add low_pass_imputation pipeline data
      author: mma
      changes:
        # Insert initial low_pass_imputation pipeline data
        - insert:
            tableName: pipelines
            columns:
              - column:
                  name: name
                  value: 'low_pass_imputation'
              - column:
                  name: version
                  value: '1'
              - column:
                  name: display_name
                  value: 'All of Us + AnVIL Low Pass WGS Imputation'
              - column:
                  name: description
                  value: 'Phase and impute low pass WGS or BGE data using GLIMPSE2 with the All of Us + AnVIL reference panel of 515,579 samples.'
              - column:
                  name: pipeline_type
                  value: 'imputation'
              - column:
                  name: wdl_url
                  value: 'https://github.com/broadinstitute/warp/blob/develop/pipelines/wdl/glimpse/low_pass_imputation/Glimpse2LowPassImputation.wdl'
              - column:
                  name: tool_name
                  value: 'Glimpse2LowPassImputation'

        # Insert quota for low_pass_imputation
        - insert:
            tableName: pipeline_quotas
            columns:
              - column:
                  name: pipeline_name
                  value: 'low_pass_imputation'
              - column:
                  name: default_quota
                  value: '500'
              - column:
                  name: min_quota_consumed
                  value: '500'
              - column:
                  name: quota_units
                  value: 'samples'

        # Insert pipeline input definitions for low_pass_imputation
        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'crams'
              - column:
                  name: type
                  value: 'FILE_ARRAY'
              - column:
                  name: is_required
                  value: 'false'
              - column:
                  name: file_suffix
                  value: '.cram'
              - column:
                  name: user_provided
                  value: 'true'
              - column:
                  name: wdl_variable_name
                  value: 'crams'
              - column:
                  name: description
                  value: 'Input CRAM files to be imputed. If submitting CRAMs, CRAM index files and sample IDs must also be submitted.'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'cramIndices'
              - column:
                  name: type
                  value: 'FILE_ARRAY'
              - column:
                  name: is_required
                  value: 'false'
              - column:
                  name: file_suffix
                  value: '.crai'
              - column:
                  name: user_provided
                  value: 'true'
              - column:
                  name: wdl_variable_name
                  value: 'cram_indices'
              - column:
                  name: description
                  value: 'CRAM index files corresponding to the input CRAM files.'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'sampleIds'
              - column:
                  name: type
                  value: 'STRING_ARRAY'
              - column:
                  name: is_required
                  value: 'false'
              - column:
                  name: user_provided
                  value: 'true'
              - column:
                  name: wdl_variable_name
                  value: 'sample_ids'
              - column:
                  name: description
                  value: 'Sample IDs corresponding to the input CRAM files. These will be the sample identifiers used in the output VCF'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'cramManifest'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: is_required
                  value: 'false'
              - column:
                  name: file_suffix
                  value: '.tsv'
              - column:
                  name: user_provided
                  value: 'true'
              - column:
                  name: wdl_variable_name
                  value: 'cram_manifest'
              - column:
                  name: description
                  value: 'Manifest TSV file containing columns sample_id, cram_path, and cram_index_path referring to cloud-hosted input files to be imputed'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'outputBasename'
              - column:
                  name: type
                  value: 'STRING'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'true'
              - column:
                  name: wdl_variable_name
                  value: 'output_basename'
              - column:
                  name: display_name
                  value: 'output basename'
              - column:
                  name: description
                  value: 'The prefix for all of the outputs'' filenames. May only contain alphanumeric characters, dashes, and underscores'


        # Insert non-user-provided input definitions for array_imputation
        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'contigs'
              - column:
                  name: type
                  value: 'STRING_ARRAY'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'false'
              - column:
                  name: default_value
                  value: '["chr1","chr2","chr3","chr4","chr5","chr6","chr7","chr8","chr9","chr10","chr11","chr12","chr13","chr14","chr15","chr16","chr17","chr18","chr19","chr20","chr21","chr22"]'
              - column:
                  name: wdl_variable_name
                  value: 'contigs'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'referencePanelPrefix'
              - column:
                  name: type
                  value: 'STRING'
              - column:
                  name: expects_custom_value
                  value: 'true'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'false'
              - column:
                  name: default_value
                  value: '/hg38/ref_panels/1000G_HGDP_with_trio_information/auxiliary_files/'
              - column:
                  name: wdl_variable_name
                  value: 'reference_panel_prefix'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'fasta'
              - column:
                  name: type
                  value: 'STRING'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'false'
              - column:
                  name: default_value
                  value: '/hg38/ref_files/Homo_sapiens_assembly38.fasta'
              - column:
                  name: wdl_variable_name
                  value: 'fasta'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'fastaIndex'
              - column:
                  name: type
                  value: 'STRING'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'false'
              - column:
                  name: default_value
                  value: '/hg38/ref_files/Homo_sapiens_assembly38.fasta.fai'
              - column:
                  name: wdl_variable_name
                  value: 'fasta_index'

        - insert:
            tableName: pipeline_input_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'refDict'
              - column:
                  name: type
                  value: 'STRING'
              - column:
                  name: is_required
                  value: 'true'
              - column:
                  name: user_provided
                  value: 'false'
              - column:
                  name: default_value
                  value: '/hg38/ref_files/Homo_sapiens_assembly38.dict'
              - column:
                  name: wdl_variable_name
                  value: 'ref_dict'

        # Insert pipeline output definitions for array_imputation
        - insert:
            tableName: pipeline_output_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'imputedVcf'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: wdl_variable_name
                  value: 'imputed_vcf'
              - column:
                  name: description
                  value: 'A multi-sample VCF file containing imputed genotypes for all samples'
              - column:
                  name: display_name
                  value: 'imputed multi-sample VCF'
              - column:
                  name: is_required
                  value: 'true'

        - insert:
            tableName: pipeline_output_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'imputedVcfIndex'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: wdl_variable_name
                  value: 'imputed_vcf_index'
              - column:
                  name: description
                  value: 'An index file for the imputed multi-sample VCF file'
              - column:
                  name: display_name
                  value: 'imputed multi-sample VCF index'
              - column:
                  name: is_required
                  value: 'true'

        - insert:
            tableName: pipeline_output_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'imputedHomRefSitesOnlyVcf'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: wdl_variable_name
                  value: 'imputed_hom_ref_sites_only_vcf'
              - column:
                  name: description
                  value: 'A sites only VCF file containing information about homozygous reference sites'
              - column:
                  name: display_name
                  value: 'imputed hom ref sites only VCF'
              - column:
                  name: is_required
                  value: 'true'

        - insert:
            tableName: pipeline_output_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'imputedHomRefSitesOnlyVcfIndex'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: wdl_variable_name
                  value: 'imputed_hom_ref_sites_only_vcf_index'
              - column:
                  name: description
                  value: 'An index file for the imputed homozygous reference sites only VCF file'
              - column:
                  name: display_name
                  value: 'imputed hom ref sites only VCF index'
              - column:
                  name: is_required
                  value: 'true'

        - insert:
            tableName: pipeline_output_definitions
            columns:
              - column:
                  name: pipeline_id
                  valueComputed: (SELECT id FROM pipelines WHERE name='low_pass_imputation' AND version=1)
              - column:
                  name: name
                  value: 'qcMetrics'
              - column:
                  name: type
                  value: 'FILE'
              - column:
                  name: wdl_variable_name
                  value: 'qc_metrics'
              - column:
                  name: description
                  value: 'A TSV file containing metrics about the input data'
              - column:
                  name: display_name
                  value: 'QC metrics TSV file'
              - column:
                  name: is_required
                  value: 'true'
