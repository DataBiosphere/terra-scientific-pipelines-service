pipelines:
  configurations:
    common:
      userDataTtlDays: 2
      quotaConsumedPollingIntervalSeconds: 1
      quotaConsumedUseCallCaching: true
      inputQcPollingIntervalSeconds: 1
      inputQcUseCallCaching: true
      monitoringScriptPath: "gs://test_bucket/test_path/to/monitoring/script.sh"
    arrayImputation:
      1:
        cromwellSubmissionPollingIntervalInSeconds: 1 # only wait 1 second when testing
        storageWorkspaceContainerUrl: "https://test_storage_workspace_url"
        inputsWithCustomValues:
          referencePanelPathPrefix: "/test_reference_panel_path_prefix/file_path"
        useCallCaching: true
        deleteIntermediateFiles: false
        useReferenceDisk: false
      0:
        cromwellSubmissionPollingIntervalInSeconds: 2
        inputKeysToPrependWithStorageWorkspaceContainerUrl: [ "prepend1", "prepend2" ]
        storageWorkspaceContainerUrl: "https://test_storage_workspace_url"
        inputsWithCustomValues:
          referencePanelPathPrefix: "/test_reference_panel_path_prefix/file_path"
        useCallCaching: false
        deleteIntermediateFiles: false
        memoryRetryMultiplier: 1.4

  catalog:
    definitions:
      array_imputation:
        "1":
          displayName: "Test Array Imputation"
          description: "Test description"
          pipelineType: "imputation"
          toolName: "ImputationBeagle"
          quota:
            defaultQuota: 2500
            minQuotaConsumed: 500
            quotaUnits: SAMPLES
          inputDefinitions:
            - name: "multiSampleVcf"
              wdlVariableName: "multi_sample_vcf"
              displayName: "multi-sample VCF"
              description: "test input"
              type: FILE
              required: true
              userProvided: true
              expectsCustomValue: false
              fileSuffix: ".vcf.gz"
          outputDefinitions:
            - name: "imputedMultiSampleVcf"
              wdlVariableName: "imputed_multi_sample_vcf"
              displayName: "imputed VCF"
              description: "test output"
              type: FILE
              required: true
